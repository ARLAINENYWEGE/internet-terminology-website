    <h1>Uniform Resource Locators (URL)</h1>
    <p>A URL is the address of a unique resource on the Web. It is the mechanism used by browsers to retrieve any published resource, such as an HTML page, a CSS document, or an image.</p>
    
    <p><b>Example:</b> <code>https://github.com/ARLAINENYWEGE</code></p>
